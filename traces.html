<!DOCTYPE html><html lang="fr"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>VéloTracker · Traces GPS</title>
<link rel="stylesheet" href="shared.css">
</head><body>

<header class="hdr">
  <h1>Traces <span>GPS</span></h1>
  <div class="hdr-right">
    <span style="font-size:12px;color:var(--muted)">Suisse Normande</span>
  </div>
</header>

<div class="c">

  <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">
    <button class="chip active" onclick="filterTraces('all',this)">Toutes</button>
    <button class="chip" onclick="filterTraces('endurance',this)">Endurance Z2</button>
    <button class="chip" onclick="filterTraces('tempo',this)">Tempo / Côtes</button>
    <button class="chip" onclick="filterTraces('grande',this)">Grande sortie</button>
    <button class="chip" onclick="filterTraces('montagne',this)">Montagne</button>
  </div>

  <div id="traces-list"></div>
</div>

<div id="nav-placeholder"></div>
<script src="shared.js"></script>
<script>
document.getElementById('nav-placeholder').outerHTML = navHTML();
markNav(); loadState();

const TRACES = [
  {
    id:'clecy-loop', cat:'endurance', name:'Boucle de Clécy',
    km:45, dp:450, diff:'Modéré', time:'1h30–1h45',
    desc:'La classique de la Suisse Normande. Idéale pour les sorties Z2 du mercredi. Vallonné régulier, peu de trafic.',
    tags:['Mercredi','Z2','45 km'],
    komoot:'https://www.komoot.com/discover/Cl%C3%A9cy/@48.9240000,-0.4740000',
    strava:'https://www.strava.com/segments/explore#48.924,-0.474,14z',
    profile:'▁▂▃▄▃▂▁▂▃▄▃▂▁'
  },
  {
    id:'rouvre-valley', cat:'endurance', name:'Vallée de la Rouvre',
    km:40, dp:380, diff:'Facile+', time:'1h20–1h35',
    desc:'Longer la Rouvre sur route peu fréquentée. Parfait pour garder la zone Z2 sans stress. Sortie récupération ou mercredi léger.',
    tags:['Mercredi','Z2','Récup','40 km'],
    komoot:'https://www.komoot.com/discover/Rouvre/@48.8500000,-0.5500000',
    strava:'https://www.strava.com/segments/explore#48.85,-0.55,13z',
    profile:'▁▂▂▃▂▁▁▂▂▃▂▁'
  },
  {
    id:'tempo-cotes', cat:'tempo', name:'Circuit Tempo + Côtes vendredi',
    km:38, dp:420, diff:'Soutenu', time:'1h15–1h30',
    desc:'Sortie vendredi : 20 min Tempo en Z3 sur la première partie plate, puis 4 répétitions de côtes 2–3 min sur le secteur montagneux.',
    tags:['Vendredi','Tempo','Répét côtes','35–45 km'],
    komoot:'https://www.komoot.com/discover/Suisse-Normande/@48.9000000,-0.5000000',
    strava:'https://www.strava.com/segments/explore#48.9,-0.5,13z',
    profile:'▁▃▃▃▄▅▄▃▄▅▄▃▁'
  },
  {
    id:'grande-orne', cat:'grande', name:'Boucle Méandres de l\'Orne',
    km:72, dp:710, diff:'Modéré', time:'2h30–3h',
    desc:'Grande sortie du dimanche. Suit les méandres de l\'Orne. Départ Clécy, retour par Thury-Harcourt. Ravitaillement à Condé-sur-Noireau (km 45).',
    tags:['Dimanche','Grande sortie','72 km'],
    komoot:'https://www.komoot.com/discover/Clécy/@48.924,-0.474,12z',
    strava:'https://www.strava.com/segments/explore#48.85,-0.5,12z',
    profile:'▁▂▃▄▃▄▅▄▃▄▃▂▁'
  },
  {
    id:'grande-conde', cat:'grande', name:'Clécy → Pont-d\'Ouilly → Condé',
    km:82, dp:850, diff:'Costaud', time:'2h45–3h30',
    desc:'La grande boucle. Passe par Pont-d\'Ouilly et Condé-sur-Noireau. Plusieurs vraies montées dans la seconde moitié. Prévois deux bidons et des barres.',
    tags:['Dimanche','Grande sortie','82 km','D+ élevé'],
    komoot:'https://www.komoot.com/discover/Pont-d-Ouilly/@48.8750000,-0.4100000',
    strava:'https://www.strava.com/segments/explore#48.875,-0.41,12z',
    profile:'▁▂▃▄▄▅▅▄▅▆▅▄▂▁'
  },
  {
    id:'grimbosq-rep', cat:'tempo', name:'Répétitions forêt de Grimbosq',
    km:42, dp:500, diff:'Intensif', time:'1h30',
    desc:'Côte de Grimbosq : 3 km à 5–7%. Idéale pour les répétitions du vendredi ou la variante extérieure du jeudi (pyramide). 4 à 5 passages selon ta forme.',
    tags:['Vendredi','Jeudi EXT','Répét','Côtes'],
    komoot:'https://www.komoot.com/discover/for%C3%AAt-de-Grimbosq/@49.0000000,-0.3500000',
    strava:'https://www.strava.com/segments/explore#49.0,-0.35,13z',
    profile:'▁▅▅▃▁▅▅▃▁▅▅▃▁'
  },
  {
    id:'mont-pincon', cat:'montagne', name:'Mont Pinçon (exploration)',
    km:90, dp:1200, diff:'Difficile', time:'3h–3h45',
    desc:'Objectif exploration quand tu seras plus fort. Point culminant de la Normandie (365 m). Plusieurs montées de 6–9%. À prévoir après 3 mois de progression.',
    tags:['Exploration','Grande sortie','90 km','D+ élevé'],
    komoot:'https://www.komoot.com/discover/Mont-Pin%C3%A7on/@48.9500000,-0.5800000',
    strava:'https://www.strava.com/segments/explore#48.95,-0.58,12z',
    profile:'▁▂▄▆▇▆▄▂▄▆▇▆▄▁'
  },
  {
    id:'suisse-normande-4000', cat:'montagne', name:'Défi 4000 m D+ (Suisse Normande)',
    km:130, dp:4100, diff:'Très difficile', time:'5h–6h',
    desc:'L\'objectif ultime local : enchaîner les cols et montées de la région pour atteindre 4000 m D+ en une seule journée. Pour quand tu as les 5000 km dans les jambes.',
    tags:['Objectif futur','130 km','4000 m D+'],
    komoot:'https://www.komoot.com/discover/Suisse-Normande/@48.9000000,-0.5000000',
    strava:'https://www.strava.com/segments/explore#48.9,-0.5,11z',
    profile:'▁▄▆▇▆▄▆▇▆▄▆▇▆▄▁'
  }
];

let currentFilter = 'all';

function filterTraces(cat, btn){
  currentFilter = cat;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  btn.classList.add('active');
  renderTraces();
}

function diffColor(d){
  if(d==='Facile+'||d==='Facile') return 'var(--green)';
  if(d==='Modéré') return 'var(--yellow)';
  if(d==='Soutenu'||d==='Intensif') return '#fb923c';
  return 'var(--red)';
}

function renderTraces(){
  const list = document.getElementById('traces-list');
  const filtered = currentFilter==='all' ? TRACES : TRACES.filter(t=>t.cat===currentFilter);
  list.innerHTML = filtered.map(t=>`
    <div class="card" style="margin-bottom:12px">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:8px">
        <div>
          <div style="font-size:15px;font-weight:700;margin-bottom:4px">${t.name}</div>
          <div style="display:flex;gap:6px;flex-wrap:wrap">
            ${t.tags.map(tag=>`<span style="font-size:11px;background:var(--card2);border:1px solid var(--border);border-radius:99px;padding:2px 9px;color:var(--muted)">${tag}</span>`).join('')}
          </div>
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div style="font-size:18px;font-weight:700;color:var(--yellow)">${t.km} km</div>
          <div style="font-size:12px;color:var(--blue)">${t.dp} m D+</div>
        </div>
      </div>
      <div style="font-family:monospace;font-size:16px;letter-spacing:2px;color:var(--muted);margin:8px 0">${t.profile}</div>
      <div style="font-size:13px;color:var(--muted);line-height:1.55;margin-bottom:12px">${t.desc}</div>
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
        <div style="display:flex;align-items:center;gap:12px">
          <span style="font-size:12px;font-weight:700;color:${diffColor(t.diff)}">${t.diff}</span>
          <span style="font-size:12px;color:var(--muted)">⏱ ${t.time}</span>
        </div>
        <div style="display:flex;gap:8px">
          <a href="${t.komoot}" target="_blank" style="display:inline-flex;align-items:center;gap:5px;background:#2a1a00;border:1px solid #4a3200;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:600;color:#f59e0b;text-decoration:none">🗺 Komoot</a>
          <a href="${t.strava}" target="_blank" style="display:inline-flex;align-items:center;gap:5px;background:#1a0a00;border:1px solid #4a1a00;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:600;color:var(--orange);text-decoration:none">⚡ Strava</a>
        </div>
      </div>
    </div>
  `).join('');
}

renderTraces();
</script>
</body></html>
