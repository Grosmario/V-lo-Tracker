<!DOCTYPE html><html lang="fr"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>VéloTracker · Programme</title>
<link rel="stylesheet" href="shared.css">
</head><body>

<header class="hdr">
  <h1>Programme <span>hebdo</span></h1>
  <div class="hdr-right">
    <span style="font-size:12px;color:var(--muted)" id="hdr-ftp">FTP : 205W</span>
  </div>
</header>

<div class="c">
  <div class="st">FTP actuelle</div>
  <div class="card" style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
    <input type="number" id="ftp-inp" placeholder="205" style="width:100px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px 10px;color:var(--text);font-size:16px;font-weight:700">
    <button class="btn" onclick="updateFtp()">Mettre à jour</button>
    <span style="font-size:12px;color:var(--muted)">Toutes les zones se recalculent</span>
  </div>

  <div class="st">Séances de la semaine</div>
  <div id="program"></div>
</div>

<div id="nav-placeholder"></div>
<script src="shared.js"></script>
<script>
document.getElementById('nav-placeholder').outerHTML = navHTML();
markNav(); loadState();
document.getElementById('ftp-inp').value = S.ftp || 205;
document.getElementById('hdr-ftp').textContent = 'FTP : '+(S.ftp||205)+'W';

function updateFtp(){
  const v = parseFloat(document.getElementById('ftp-inp').value);
  if(!v) return;
  S.ftp = v; saveState();
  document.getElementById('hdr-ftp').textContent='FTP : '+v+'W';
  renderProgram(v);
}

function stepsHtml(steps){
  return steps.map((s,i)=>`
    <div class="step">
      <div class="step-n">${i+1}</div>
      <div class="step-b"><div class="step-t">${s.t}</div><div class="step-d">${s.d}</div></div>
    </div>`).join('');
}

function renderProgram(ftp){
  const days = [
    { id:'lun', name:'Lundi', sub:'Récupération', type:'off', badge:null, tss:0,
      only:[{t:'Repos ou récup active',d:'Marche, étirements, foam roller. Aucun effort vélo.'}]
    },
    { id:'mar', name:'Mardi', sub:'Sweet Spot + VO2max', type:'ht', badge:'55 min', tss:90,
      ht:[
        {t:'Échauffement 10 min',d:`Z1→Z2 progressif. Cadence 85–90 rpm. <span class="fz z2">56–75% = ${w(ftp,65)}</span>`},
        {t:'Sweet Spot × 2 blocs de 15 min',d:`Récup 5 min entre. Maintiens <span class="fz z4">88–93% = ${w(ftp,90)}</span>. Cadence 88–92 rpm.`},
        {t:'VO2max × 4 répétitions de 4 min',d:`Récup 3 min. <span class="fz z5">108–115% = ${w(ftp,111)}</span>. Effort inconfortable, cadence libre.`},
        {t:'Retour au calme 5 min',d:`<span class="fz z1">${w(ftp,50)}</span>. Respiration qui redescend.`}
      ],
      ext:[
        {t:'Échauffement 15 min',d:`Route vers le secteur côtes. <span class="fz z2">56–70% = ${w(ftp,63)}</span>`},
        {t:'2 montées longues (10–15 min)',d:`Côte vers Clécy ou St-Rémy. Maintiens <span class="fz z4">88–93% = ${w(ftp,90)}</span>. Redescends doucement entre les deux.`},
        {t:'4 sprints-côte de 2–3 min',d:`Bosse plus raide. <span class="fz z5">110%+ = ${w(ftp,111)}</span> en montant, récup en redescendant.`},
        {t:'Retour base 15–20 min',d:`Z2 pour rentrer. Total ~50–60 km, 500–600 m D+.`}
      ]
    },
    { id:'mer', name:'Mercredi', sub:'Endurance Z2', type:'route', badge:'40–50 km', tss:55,
      only:[
        {t:'Z2 pur sur tout le trajet',d:`<span class="fz z2">56–75% = ${w(ftp,65)}</span>. Cadence 85–95 rpm. Peux-tu tenir une conversation ? C'est bon.`},
        {t:'Côtes : ne dépasse pas Z3',d:`<span class="fz z3">80% max = ${w(ftp,80)}</span>. Rétrograde si nécessaire.`},
        {t:'Itinéraires',d:'Clécy → Saint-Rémy → Thury-Harcourt (~45 km, 450 m D+) ou vallée de la Rouvre (~40 km, 380 m D+).'}
      ]
    },
    { id:'jeu', name:'Jeudi', sub:'Pyramide Seuil', type:'ht', badge:'50 min', tss:75,
      ht:[
        {t:'Échauffement 8 min',d:'3 × 20 sec sprint à fond + 40 sec récup pour activer les fibres rapides.'},
        {t:'Pyramide seuil 5 – 8 – 5 min',d:`5 min <span class="fz z4">95–100% = ${w(ftp,97)}</span> · récup 4 min<br>8 min <span class="fz z4">95–105% = ${w(ftp,100)}</span> · récup 5 min<br>5 min <span class="fz z4">100–105% = ${w(ftp,102)}</span>`},
        {t:'Retour au calme 5–8 min',d:`<span class="fz z1">${w(ftp,52)}</span>. Séance la plus dure de la semaine.`}
      ],
      ext:[
        {t:'Échauffement 15 min',d:'Route jusqu\'à une montée de 8–15 min (Grimbosq, Mutrécy, Saint-Omer).'},
        {t:'Pyramide en vraie côte',d:`Monte 3 fois en durées croissantes : 5 min <span class="fz z4">${w(ftp,97)}</span> → 8 min <span class="fz z4">${w(ftp,100)}</span> → 5 min <span class="fz z4">${w(ftp,102)}</span>. Redescends en récup entre chaque.`},
        {t:'Rentre tranquillement',d:`Z1–Z2. Total ~40 km, 400–500 m D+.`}
      ]
    },
    { id:'ven', name:'Vendredi', sub:'Tempo + Côtes', type:'route', badge:'35–45 km', tss:70,
      only:[
        {t:'Échauffement 10 min',d:'Z1 léger pour préparer les jambes.'},
        {t:'20 min Tempo Z3',d:`Maintiens <span class="fz z3">76–90% = ${w(ftp,83)}</span>. Effort soutenu mais contrôlé.`},
        {t:'3 à 5 répétitions côtes 2–3 min',d:`<span class="fz z5">100–110% = ${w(ftp,105)}</span> en montant. Récup complète en redescendant.`},
        {t:'Retour Z1–Z2',d:'Les 10–15 derniers km tranquilles. Prépare la grande sortie dimanche.'}
      ]
    },
    { id:'sam', name:'Samedi', sub:'Travail — repos forcé', type:'off', badge:null, tss:0,
      only:[{t:'Journée de travail',d:'Repos cycliste. Mange bien et hydrate-toi pour la grande sortie du lendemain.'}]
    },
    { id:'dim', name:'Dimanche', sub:'Grande sortie', type:'big', badge:'70–90 km', tss:110,
      only:[
        {t:'2 premières heures en Z2',d:`<span class="fz z2">60–75% = ${w(ftp,67)}</span>. Résiste à l'envie de partir fort.`},
        {t:'Sur les montées',d:`Pointes jusqu'à <span class="fz z3">80–85% = ${w(ftp,82)}</span>.`},
        {t:'Ravitaillement',d:'1 barre ou gel toutes les 45 min. 750 ml eau/heure.'},
        {t:'Itinéraires suggérés',d:'Clécy → Pont-d\'Ouilly → Condé-sur-Noireau (~80 km, 850 m D+)<br>ou Boucle Méandres de l\'Orne (~70 km, 700 m D+).'}
      ]
    }
  ];

  const typeLabel={ht:'HT',route:'ROUTE',off:'OFF',big:'SORTIE'};
  const prog=document.getElementById('program');
  prog.innerHTML='';

  days.forEach(day=>{
    const hasVariant = !day.only;
    let detailHtml='';
    if(hasVariant){
      detailHtml=`<div class="tabs">
        <button class="tab-btn active" onclick="switchTab(event,'${day.id}','ht')">🏠 Home Trainer <span style="font-size:10px;opacity:.6">${day.tss} TSS</span></button>
        <button class="tab-btn" onclick="switchTab(event,'${day.id}','ext')">🌿 Extérieur</button>
      </div>
      <div class="tab-pane active" id="tab-${day.id}-ht" style="padding:14px 16px">${stepsHtml(day.ht)}</div>
      <div class="tab-pane" id="tab-${day.id}-ext" style="padding:14px 16px">${stepsHtml(day.ext)}</div>`;
    } else {
      detailHtml=`<div style="padding:14px 16px">${stepsHtml(day.only)}</div>`;
    }

    const tssTag = day.tss>0 ? `<span style="font-size:11px;color:var(--muted);margin-left:6px">${day.tss} TSS</span>`:'';
    prog.innerHTML+=`
      <div style="background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:10px">
        <div style="display:flex;align-items:center;padding:13px 16px;gap:11px;cursor:pointer" onclick="toggleDay('${day.id}')">
          <div class="badge badge-${day.type}" style="width:46px;text-align:center;border-radius:8px;padding:4px 0">${typeLabel[day.type]}</div>
          <div style="flex:1;min-width:0">
            <div style="font-size:14px;font-weight:600">${day.name}${tssTag}</div>
            <div style="font-size:12px;color:var(--muted);margin-top:1px">${day.sub}</div>
          </div>
          ${day.badge?`<span class="badge badge-${day.type==='big'?'big':day.type}">${day.badge}</span>`:''}
          <span id="chev-${day.id}" style="font-size:12px;color:var(--muted);transition:transform .2s">▸</span>
        </div>
        <div id="detail-${day.id}" style="display:none;border-top:1px solid var(--border)">${detailHtml}</div>
      </div>`;
  });
}

function toggleDay(id){
  const d=document.getElementById('detail-'+id);
  const c=document.getElementById('chev-'+id);
  const open=d.style.display==='none';
  d.style.display=open?'block':'none';
  c.style.transform=open?'rotate(90deg)':'';
}
function switchTab(evt,dayId,tab){
  const parent=document.getElementById('detail-'+dayId);
  parent.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  parent.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  evt.currentTarget.classList.add('active');
  document.getElementById('tab-'+dayId+'-'+tab).classList.add('active');
}

renderProgram(S.ftp||205);
</script>
</body></html>
